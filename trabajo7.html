<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor PDF Libro - Desarrollo Gerencial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcfbfa;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Encabezado Superior */
        header {
            background: linear-gradient(135deg, #f7f5f0 0%, #ffffff 100%);
            border-bottom: 2px solid #e2dcc8;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(184, 161, 121, 0.08);
            z-index: 10;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .unah-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fdfcf7;
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            color: #b89734;
            text-align: center;
            line-height: 1.1;
        }

        .title-area h1 {
            font-size: 15px;
            color: #7c6843;
            font-weight: 600;
        }

        .title-area p {
            font-size: 10px;
            color: #a3957a;
            text-transform: uppercase;
        }

        .page-indicator {
            font-size: 13px;
            color: #7c6843;
            background: #fdfcf9;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid #e8e3d3;
            font-weight: bold;
        }

        /* Área Principal de Lectura */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7f6f2;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        /* Contenedor del Libro Centrado */
        .book-container {
            width: 90%;
            max-width: 500px; /* Tamaño ideal para simular una página de libro vertical */
            height: 80vh;
            max-height: 700px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Cada página del PDF */
        .pdf-page-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transform: rotateY(90deg);
            transition: transform 0.5s ease, opacity 0.5s ease;
            transform-origin: left center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Página Activa */
        .pdf-page-wrapper.active {
            opacity: 1;
            pointer-events: auto;
            transform: rotateY(0deg);
            z-index: 2;
        }

        /* Página que ya pasó (Hacia la izquierda) */
        .pdf-page-wrapper.passed {
            opacity: 0;
            transform: rotateY(-90deg);
            z-index: 1;
        }

        .pdf-page-canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            background: white;
            border: 1px solid #e8e3d3;
            border-radius: 4px;
            object-fit: contain;
        }

        /* Flechas de Navegación (PC) */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(243, 237, 215, 0.9);
            border: 1px solid #dcd1af;
            color: #7c6843;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: all 0.2s;
            user-select: none;
        }

        .nav-arrow:hover {
            background-color: #ebdca7;
        }

        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        /* Estados de Carga */
        .empty-state {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b0a68f;
            text-align: center;
            gap: 10px;
            z-index: 4;
        }

        /* Optimización total para Celulares */
        @media (max-width: 768px) {
            header {
                padding: 8px 12px;
            }
            .title-area h1 { font-size: 13px; }
            .book-container {
                width: 95%;
                height: 75vh;
            }
            .nav-arrow {
                display: none; /* Escondemos flechas en cel para priorizar el arrastre con el dedo */
            }
        }

        footer {
            background: linear-gradient(0deg, #f7f5f0 0%, #ffffff 100%);
            border-top: 1px solid #e8e3d3;
            padding: 6px 20px;
            text-align: center;
            font-size: 10px;
            color: #a3957a;
        }
    </style>
</head>
<body>

    <header>
        <div class="branding">
            <div class="unah-logo">UNAH<br>🖃</div>
            <div class="title-area">
                <h1>Desarrollo Gerencial / Desarrollo Administrativo trabajao 6</h1>
                <p>Modo Libro Interactivo</p>
            </div>
        </div>
        <div class="page-indicator" id="page-counter">
            Pág: <span id="current-page">0</span> / <span id="total-pages">0</span>
        </div>
    </header>

    <main id="swipe-area">
        <button class="nav-arrow arrow-left" id="prev-btn">&#10094;</button>
        <button class="nav-arrow arrow-right" id="next-btn">&#10095;</button>

        <div class="empty-state" id="loading-status">
            <h3>Abriendo Libro...</h3>
            <p>Procesando Trabajo6.pdf desde GitHub</p>
        </div>

        <div class="book-container" id="book-container"></div>
    </main>

    <footer>
        República de Honduras — Espacio Académico
    </footer>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Escala alta para celulares para que las letras no pierdan nitidez al encajarse
        const scale = 2.0; 
        const urlPorDefecto = "https://raw.githubusercontent.com/wilim2/InnovadoresEmpresariales/main/Trabajo7.pdf";
        
        let pdfDoc = null;
        let currentPageIndex = 1;
        let totalPagesCount = 0;

        // Variables para detectar gestos de arrastrar (Swipe) en celular
        let touchStartX = 0;
        let touchEndX = 0;

        function inicializarLibro(buffer) {
            const container = document.getElementById('book-container');
            container.innerHTML = '';

            pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise.then(async function(pdf) {
                pdfDoc = pdf;
                totalPagesCount = pdf.numPages;
                document.getElementById('total-pages').textContent = totalPagesCount;
                document.getElementById('loading-status').style.display = 'none';

                // Renderizar todas las páginas ocultas en segundo plano para transiciones fluidas
                for (let pageNum = 1; pageNum <= totalPagesCount; pageNum++) {
                    const page = await pdfDoc.getPage(pageNum);
                    
                    // Crear envoltorio de la página estilo libro
                    const wrapper = document.createElement('div');
                    wrapper.className = `pdf-page-wrapper page-num-${pageNum}`;
                    if (pageNum === 1) wrapper.className += ' active';

                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page-canvas';
                    wrapper.appendChild(canvas);
                    container.appendChild(wrapper);

                    const ctx = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: scale });
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = { canvasContext: ctx, viewport: viewport };
                    await page.render(renderContext).promise;
                }
                
                actualizarInterfazVista();

            }).catch(error => {
                document.getElementById('loading-status').innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
            });
        }

        function cambiarPagina(direccion) {
            if (!pdfDoc) return;

            const paginaAnterior = currentPageIndex;
            if (direccion === 'siguiente' && currentPageIndex < totalPagesCount) {
                currentPageIndex++;
            } else if (direccion === 'anterior' && currentPageIndex > 1) {
                currentPageIndex--;
            }

            if (paginaAnterior !== currentPageIndex) {
                actualizarInterfazVista();
            }
        }

        function actualizarInterfazVista() {
            document.getElementById('current-page').textContent = currentPageIndex;

            // Cambiar clases CSS de animación 3D
            for (let i = 1; i <= totalPagesCount; i++) {
                const el = document.querySelector(`.page-num-${i}`);
                if (!el) continue;

                el.classList.remove('active', 'passed');
                if (i === currentPageIndex) {
                    el.classList.add('active');
                } else if (i < currentPageIndex) {
                    el.classList.add('passed');
                }
            }
        }

        // --- CONTROLES DE ESCRITORIO (Flechas y Teclado) ---
        document.getElementById('next-btn').addEventListener('click', () => cambiarPagina('siguiente'));
        document.getElementById('prev-btn').addEventListener('click', () => cambiarPagina('anterior'));
        
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") cambiarPagina('siguiente');
            if (e.key === "ArrowLeft") cambiarPagina('anterior');
        });

        // --- CONTROLES TÁCTILES CELULAR (Arrastrar / Swipe) ---
        const areaTactil = document.getElementById('swipe-area');

        areaTactil.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        areaTactil.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            procesarGestoDeslizamiento();
        }, { passive: true });

        function procesarGestoDeslizamiento() {
            const distanciaMinima = 50; // Pixeles mínimos para registrar el movimiento
            if (touchStartX - touchEndX > distanciaMinima) {
                // Arrastró hacia la izquierda -> Siguiente Página
                cambiarPagina('siguiente');
            }
            if (touchEndX - touchStartX > distanciaMinima) {
                // Arrastró hacia la derecha -> Página Anterior
                cambiarPagina('anterior');
            }
        }

        // Descarga automática inicial segura
        window.addEventListener('DOMContentLoaded', () => {
            fetch(urlPorDefecto)
                .then(res => {
                    if (!res.ok) throw new Error("Asegúrate de que tu repositorio sea Público en GitHub.");
                    return res.arrayBuffer();
                })
                .then(buffer => inicializarLibro(buffer))
                .catch(err => {
                    document.getElementById('loading-status').innerHTML = `<h3>Error de Conexión</h3><p>${err.message}</p>`;
                });
        });
    </script>
</body>
</html>
